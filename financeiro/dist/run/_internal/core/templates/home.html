{% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<title>Personal Financial Control System</title>

<div class="container">
    <h1>❖ FINANÇAS</h1>

    <div class="saldo">
        Saldo: R$ {{ saldo|floatformat:2}}
    </div>

    <a href="/add/">+ Nova Transação</a>


    <ul>
 {% for t in transacoes %}
        <li class="{% if t.tipo == 'R' %}receita{% else %}despesa{% endif %}">
            
            <span>{{ t.titulo }} - R$ {{ t.valor }}</span>

            <form method="post" action="{% url 'deletar' t.id %}">
                {% csrf_token %}
                <button class="btn-delete">X</button>
            </form>

        </li>
    {% endfor %}
</ul>


    <a href="/zerar/" onclick="return confirm('Tem certeza?')">
    Zerar Tudo
</a>
<a href="/exportar/">Exportar</a>

    
</div>
